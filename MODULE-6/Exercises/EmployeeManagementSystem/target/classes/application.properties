# ── Primary datasource ───────────────────────────────────────────────────
spring.datasource.primary.url=jdbc:h2:mem:employeesdb
spring.datasource.primary.driver-class-name=org.h2.Driver
spring.datasource.primary.username=sa
spring.datasource.primary.password=password

# ── Secondary datasource (reporting DB) ──────────────────────────────────
spring.datasource.secondary.url=jdbc:h2:mem:reportingdb
spring.datasource.secondary.driver-class-name=org.h2.Driver
spring.datasource.secondary.username=sa
spring.datasource.secondary.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── JPA / Hibernate settings ───────────────────────────────────────────────
# create-drop: creates tables at startup, drops them at shutdown
# update: keeps data between restarts (use for MySQL)
spring.jpa.hibernate.ddl-auto=create-drop

# show-sql: prints every SQL statement to console (useful for debugging)
spring.jpa.show-sql=true

# format_sql: makes the printed SQL readable with indentation
spring.jpa.properties.hibernate.format_sql=true

# ── Exercise 10: Hibernate Batch Processing ────────────────────────────────
# batch_size: groups INSERT/UPDATE statements into batches of 20
spring.jpa.properties.hibernate.jdbc.batch_size=20
# order_inserts/updates: re-orders SQL so same-type statements batch together
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── H2 Console (browser UI at http://localhost:8080/h2-console) ──────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Server ─────────────────────────────────────────────────────────────────
server.port=8080
